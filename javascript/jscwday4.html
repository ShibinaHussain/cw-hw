<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<script>
const randomNumber = Math.floor(Math.random() * 100) + 1;
console.log("Random number:", randomNumber);
const userScoreString = "75";
console.log("User score as string:", userScoreString);
const userScore = Number(userScoreString); 
console.log("User score as number:", userScore);
const difference = randomNumber - userScore;
console.log("Difference (random - user):", difference);
const sqrtRounded = Math.round(Math.sqrt(userScore));
console.log("Rounded sqrt of user score:", sqrtRounded);
const pi = Math.PI;
console.log("Pi:", pi);
const multiplied = "50" * 2; 
console.log('"50" * 2 =', multiplied);
</script>
</body>
</html>
