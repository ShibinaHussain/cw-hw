<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup Form</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-primary">

<div class="container">
  <div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h3 class="mb-4">Sign Up</h3>
          <form id="signupForm" novalidate>
            <p>Please fill in the form to create an account</p>
            
            <div class="form-row">
              <div class="form-group col-md-6">
                <label for="firstName">First Name</label>
                <input type="text" class="form-control" id="firstName" placeholder="FirstName" required>
                <div class="invalid-feedback">First name is required.</div>
              </div>
              <div class="form-group col-md-6">
                <label for="lastName">Last Name</label>
                <input type="text" class="form-control" id="lastName" placeholder="Last Name" required>
                <div class="invalid-feedback">Last name is required.</div>
              </div>
            </div>

            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" class="form-control" id="email" placeholder="Email" required>
              <div class="invalid-feedback">Please enter a valid email.</div>
            </div>

            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" class="form-control" id="password" placeholder="Password" minlength="6" required>
              <div class="invalid-feedback">Password must be at least 6 characters.</div>
            </div>

            <div class="form-group">
              <label for="confirmPassword">Confirm Password</label>
              <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm Password" required>
              <div class="invalid-feedback" id="confirmPasswordFeedback">Please confirm your password.</div>
            </div>
            <div class="form-check">
            <label class="form-check-label">
             <input type="checkbox" class="form-check-input" value=""> I accept the <a href="#">Terms of Use</a> & <a href="#">Privacy Policy</a>
            </div>
             <div class="container">
            <button type="submit" class="btn btn-primary btn-block"> Sign Up</button>
            </div>
            <p class="text-center mt-3 mb-0 text-muted">
              Already have an account? <a href="#">Log in</a>
            </p>
          </form>
      </div>
    </div>
  </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
