<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
</head>
<body>
    <div class="container">
        <h1 style="background-color:beige;">We'd Love your Feedback</h1>
 </div>
 <div class="form-group">
    <label for="Name"><strong>Name</strong></label>
    <input type="name" class="form-control" id="name" placeholder="Enter Your Name" name="name">
    <label for="Email"><strong>Email:</strong></label>
    <input type="email" class="form-control" id="Email" placeholder="Enter Your Email" name="email">
    <label for="Type of order"><strong>Type of order</strong></label><br>
     <select class="form-select" id="orderType" required>
                  <option value="" selected disabled>Select your order type</option>
                  <option value="Cake">Cake</option>
                  <option value="Cookies">Cookies</option>
                  <option value="Pastries">Pastries</option>
                </select><br>
                <label for="satisfactionLevel" class="form-label">
                  <strong>Satisfaction Level</strong>: <span id="satisfactionValue">5</span>/10
                </label>
                 <input type="range" class="form-range" min="1" max="10" value="5" id="satisfactionLevel" 
                       oninput="document.getElementById('satisfactionValue').textContent = this.value">
                 <label class="form-label d-block"><strong>Preferred Contact Method</strong></label>
                 <div class="form-check form-check-inline">
                 <input class="form-check-input" type="radio" name="contactMethod" id="Email" value="Email">
                  <label class="form-check-label" for="Email">Email</label>
                   <input class="form-check-input" type="radio" name="contactMethod" id="contactPhone" value="Phone">
                  <label class="form-check-label" for="contactPhone">Phone</label><br>
                   <div class="mb-4">
                <label for="feedbackMessage" class="form-label"><strong>Your Feedback</strong></label>
                <textarea class="form-control" id="feedbackMessage" rows="4" 
                          placeholder="Tell us about your experience..." required></textarea>
              </div>

              <!-- Submit Button -->
              <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg">Submit Feedback</button>
              </div>
            </div>
 </div>
    
</body>
</htmls
