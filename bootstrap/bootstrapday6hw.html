<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bakery Feedback Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h3 class="card-title text-center mb-4">We'd Love Your Feedback!</h3>
            
            <form>
             
              <div class="mb-3">
                <label for="customerName" class="form-label"><strong>Name</strong></label>
                <input type="text" class="form-control" id="customerName" placeholder="Enter your name" required>
              </div>

              
              <div class="mb-3">
                <label for="customerEmail" class="form-label"><strong>Email</strong></label>
                <input type="email" class="form-control" id="customerEmail" placeholder="you@example.com" required>
              </div>

              
              <div class="mb-3">
                <label for="orderType" class="form-label"><strong>Type of Order</strong></label>
                <select class="form-select" id="orderType" required>
                  <option value="" selected disabled>Select your order type</option>
                  <option value="Cake">Cake</option>
                  <option value="Cookies">Cookies</option>
                  <option value="Pastries">Pastries</option>
                </select>
              </div>

             
              <div class="mb-3">
                <label for="satisfactionLevel" class="form-label">
                  <strong>Satisfaction Level</strong>: <span id="satisfactionValue">5</span>/10
                </label>
                <input type="range" class="form-range" min="1" max="10" value="5" id="satisfactionLevel" 
                       oninput="document.getElementById('satisfactionValue').textContent = this.value">
              </div>

              
              <div class="mb-3">
                <label class="form-label d-block"><strong>Preferred Contact Method</strong></label>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="contactMethod" id="contactEmail" value="Email" checked>
                  <label class="form-check-label" for="contactEmail">Email</label>
                </div>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="contactMethod" id="contactPhone" value="Phone">
                  <label class="form-check-label" for="contactPhone">Phone</label>
                </div>
              </div>

             
              <div class="mb-4">
                <label for="feedbackMessage" class="form-label"><strong>Your Feedback</strong></label>
                <textarea class="form-control" id="feedbackMessage" rows="4" 
                          placeholder="Tell us about your experience..." required></textarea>
              </div>
              <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg">Submit Feedback</button>
              </div>
            </form>

          </div>
        </div>
        <p class="text-center text-muted mt-3 small">Thank you for helping us bake better!</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
