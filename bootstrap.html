<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Progress Dashboard</title>
    <!-- Bootstrap 4 CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        .progress { height: 25px; }
        .progress-bar { font-weight: bold; }
    </style>
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-sm">
        <div class="card-body">
            
            <!-- Breadcrumb Navigation -->
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb bg-white pl-0">
                    <li class="breadcrumb-item"><a href="#">Home</a></li>
                    <li class="breadcrumb-item"><a href="#">Courses</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Web Development</li>
                </ol>
            </nav>

            <!-- Heading with Badge -->
            <h2 class="mb-4">Web Development Course <span class="badge badge-success">New</span></h2>

            <!-- Progress Bars -->
            <div class="mb-4">
                <label>HTML - 100%</label>
                <div class="progress mb-3">
                    <div class="progress-bar bg-success progress-bar-striped" style="width: 100%;">100%</div>
                </div>

                <label>CSS - 75%</label>
                <div class="progress mb-3">
                    <div class="progress-bar bg-info progress-bar-striped progress-bar-animated" style="width: 75%;">75%</div>
                </div>

                <label>JavaScript - 50%</label>
                <div class="progress mb-3">
                    <div class="progress-bar bg-warning" style="width: 50%;">50%</div>
                </div>

                <label>Bootstrap - 25%</label>
                <div class="progress mb-3">
                    <div class="progress-bar bg-danger" style="width: 25%;">25%</div>
                </div>
            </div>

            <!-- Button Group -->
            <div class="btn-group mb-4" role="group">
                <button type="button" class="btn btn-primary">Start</button>
                <button type="button" class="btn btn-warning">Pause</button>
                <button type="button" class="btn btn-danger">Reset</button>
            </div>

            <!-- Pagination -->
            <nav aria-label="Page navigation">
                <ul class="pagination justify-content-center">
                    <li class="page-item active"><a class="page-link" href="#">1</a></li>
                    <li class="page-item"><a class="page-link" href="#">2</a></li>
                    <li class="page-item disabled"><a class="page-link" href="#">3</a></li>
                </ul>
            </nav>

        </div>
    </div>
</div>

<!-- Bootstrap JS and jQuery -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
